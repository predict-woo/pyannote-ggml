name: Release Node Packages

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-node-packages-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sentry_release: ${{ steps.meta.outputs.sentry_release }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"

          node - "$VERSION" <<'NODE'
          const fs = require('node:fs');

          const expectedVersion = process.argv[2];
          const packageFiles = [
            'bindings/node/packages/pyannote-cpp-node/package.json',
            'bindings/node/packages/darwin-arm64/package.json',
            'bindings/node/packages/win32-x64/package.json',
          ];

          for (const file of packageFiles) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (pkg.version !== expectedVersion) {
              throw new Error(`${file} has version ${pkg.version}, expected ${expectedVersion}`);
            }
          }
          NODE

          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi

          {
            echo "version=$VERSION"
            echo "sentry_release=pyannote-cpp-node@$VERSION"
            echo "npm_tag=$NPM_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Install Sentry CLI
        run: npm install --global @sentry/cli

      - name: Ensure Sentry release exists
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE="${{ steps.meta.outputs.sentry_release }}"

          if sentry-cli releases info "$RELEASE" >/dev/null 2>&1; then
            echo "Sentry release $RELEASE already exists"
          else
            sentry-cli releases new "$RELEASE"
          fi

          sentry-cli releases set-commits "$RELEASE" --auto || true

  build-darwin-arm64:
    name: Build Darwin ARM64 Package
    runs-on: macos-14
    needs: prepare
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: bindings/node/pnpm-lock.yaml

      - name: Install workspace dependencies
        working-directory: bindings/node
        run: pnpm install --frozen-lockfile

      - name: Install Sentry CLI
        run: npm install --global @sentry/cli

      - name: Configure diarization builds
        run: |
          cmake -S diarization-ggml -B diarization-ggml/build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DEMBEDDING_COREML=ON \
            -DSEGMENTATION_COREML=ON \
            -DWHISPER_COREML=ON

          cmake -S diarization-ggml -B diarization-ggml/build-static \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DDIARIZATION_STATIC=ON \
            -DEMBEDDING_COREML=ON \
            -DSEGMENTATION_COREML=ON \
            -DWHISPER_COREML=ON

      - name: Build diarization binaries
        run: |
          cmake --build diarization-ggml/build --config RelWithDebInfo --parallel
          cmake --build diarization-ggml/build-static --config RelWithDebInfo --parallel

      - name: Build native addon
        working-directory: bindings/node/packages/darwin-arm64
        run: |
          npx cmake-js clean || true
          npx cmake-js configure \
            --CDCMAKE_BUILD_TYPE=RelWithDebInfo \
            --CDEMBEDDING_COREML=ON \
            --CDSEGMENTATION_COREML=ON \
            --CDWHISPER_COREML=ON
          npx cmake-js build \
            --CDCMAKE_BUILD_TYPE=RelWithDebInfo \
            --CDEMBEDDING_COREML=ON \
            --CDSEGMENTATION_COREML=ON \
            --CDWHISPER_COREML=ON

      - name: Stage native addon
        working-directory: bindings/node
        run: node ./scripts/stage-native-addon.js --platform darwin-arm64 --copy-node-modules true

      - name: Build TypeScript facade
        working-directory: bindings/node/packages/pyannote-cpp-node
        run: pnpm build

      - name: Run full Node test suite
        working-directory: bindings/node
        run: pnpm test -- --no-file-parallelism

      - name: Upload native symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: |
          sentry-cli debug-files upload --include-sources \
            bindings/node/packages/darwin-arm64/build/Release/pyannote-addon.node \
            bindings/node/packages/darwin-arm64/build/Release/pyannote-addon.node.dSYM

      - name: Pack darwin-arm64 npm package
        id: pack
        working-directory: bindings/node/packages/darwin-arm64
        run: |
          TARBALL="$(npm pack)"
          echo "tarball=$PWD/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload darwin-arm64 package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-darwin-arm64
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

      - name: Upload darwin-arm64 symbol artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentry-symbols-darwin-arm64
          path: |
            bindings/node/packages/darwin-arm64/build/Release/pyannote-addon.node
            bindings/node/packages/darwin-arm64/build/Release/pyannote-addon.node.dSYM
          if-no-files-found: error

  build-win32-x64:
    name: Build Windows x64 Package
    runs-on: windows-2022
    needs: prepare
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: bindings/node/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          version: latest
          cache: true

      - name: Install OpenVINO runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install openvino
          echo "OpenVINO_DIR=$(python -c 'from openvino import get_cmake_path; print(get_cmake_path())')" >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        working-directory: bindings/node
        run: pnpm install --frozen-lockfile

      - name: Install Sentry CLI
        run: npm install --global @sentry/cli

      - name: Build native addon
        working-directory: bindings/node/packages/win32-x64
        run: |
          npx cmake-js clean || true
          npx cmake-js configure \
            --CDCMAKE_BUILD_TYPE=RelWithDebInfo \
            --CDADDON_VULKAN=ON \
            --CDADDON_OPENVINO=ON
          npx cmake-js build \
            --CDCMAKE_BUILD_TYPE=RelWithDebInfo \
            --CDADDON_VULKAN=ON \
            --CDADDON_OPENVINO=ON

      - name: Stage native addon
        working-directory: bindings/node
        run: node ./scripts/stage-native-addon.js --platform win32-x64 --copy-node-modules true

      - name: Build TypeScript facade
        working-directory: bindings/node/packages/pyannote-cpp-node
        run: pnpm build

      - name: Run full Node test suite
        working-directory: bindings/node
        run: pnpm test -- --no-file-parallelism

      - name: Upload native symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: |
          sentry-cli debug-files upload --include-sources \
            bindings/node/packages/win32-x64/build/Release/pyannote-addon.node \
            bindings/node/packages/win32-x64/build/Release/pyannote-addon.pdb

      - name: Pack win32-x64 npm package
        id: pack
        working-directory: bindings/node/packages/win32-x64
        run: |
          TARBALL="$(npm pack)"
          echo "tarball=$PWD/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload win32-x64 package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-win32-x64
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

      - name: Upload win32-x64 symbol artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentry-symbols-win32-x64
          path: |
            bindings/node/packages/win32-x64/build/Release/pyannote-addon.node
            bindings/node/packages/win32-x64/build/Release/pyannote-addon.pdb
            bindings/node/packages/win32-x64/build/Release/*.dll
          if-no-files-found: error

  publish:
    name: Publish npm Packages
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-darwin-arm64
      - build-win32-x64
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download platform package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-package-*
          merge-multiple: true
          path: dist/npm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: bindings/node/pnpm-lock.yaml

      - name: Install workspace dependencies
        working-directory: bindings/node
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript facade
        working-directory: bindings/node/packages/pyannote-cpp-node
        run: pnpm build

      - name: Publish npm packages
        run: |
          set -euo pipefail

          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm_tag }}"

          publish_if_missing() {
            local package_name="$1"
            local package_file="$2"

            if [[ -z "$package_file" || ! -f "$package_file" ]]; then
              echo "Package tarball not found for ${package_name}" >&2
              return 1
            fi

            if npm view "${package_name}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${VERSION}; already published"
              return 0
            fi

            npm publish "$package_file" --access public --tag "$NPM_TAG" --provenance
          }

          publish_if_missing \
            "@pyannote-cpp-node/darwin-arm64" \
            "$(find dist/npm -maxdepth 1 -type f -name 'pyannote-cpp-node-darwin-arm64-*.tgz' | head -n 1)"

          publish_if_missing \
            "@pyannote-cpp-node/win32-x64" \
            "$(find dist/npm -maxdepth 1 -type f -name 'pyannote-cpp-node-win32-x64-*.tgz' | head -n 1)"

          cd bindings/node/packages/pyannote-cpp-node
          FACADE_TARBALL="$(npm pack)"
          publish_if_missing "pyannote-cpp-node" "$PWD/$FACADE_TARBALL"

      - name: Install Sentry CLI
        run: npm install --global @sentry/cli

      - name: Finalize Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: |
          RELEASE="${{ needs.prepare.outputs.sentry_release }}"
          if sentry-cli releases info "$RELEASE" >/dev/null 2>&1; then
            sentry-cli releases finalize "$RELEASE"
          fi
